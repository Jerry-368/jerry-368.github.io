<!DOCTYPE html>
<html>

<head>
<title>Jerin Johnson | Unity Gameplay Developer</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0f1a;
color:white;
text-align:center;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
background:#0b0f1a;
padding:15px;
display:flex;
justify-content:center;
gap:40px;
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.navbar a:hover{
color:#4aa3ff;
}

/* HERO */
.hero{
height:100vh;
background:url("banner.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center; /* FIXED CENTER */
position:relative;
overflow:hidden;
}

/* DARK OVERLAY */
.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:1;
}

/* ANIMATION (VISIBLE NOW) */
.hero::after{
content:"";
position:absolute;
top:0;
left:-50%;
width:200%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(74,163,255,0.25),
transparent
);
animation:sweep 4s linear infinite;
z-index:1;
}

/* LIGHT BLOBS */
.light{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle, rgba(74,163,255,0.35), transparent);
filter:blur(60px);
animation:float 8s ease-in-out infinite;
z-index:1;
}

.light1{ top:10%; left:15%; }
.light2{ bottom:10%; right:15%; animation-delay:3s; }

/* KEEP CONTENT ABOVE */
.hero *{
position:relative;
z-index:2;
}

/* BUTTONS */
.buttons{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
width:100%; /* FIXED */
}

.btn{
padding:12px 25px;
border:2px solid #4aa3ff;
border-radius:8px;
text-decoration:none;
color:white;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(6px);
font-weight:bold;
transition:0.3s;
display:inline-block;
margin-top:10px;
}

.btn:hover{
background:#4aa3ff;
color:black;
transform:scale(1.05);
box-shadow:0 0 15px #4aa3ff;
}

/* SECTIONS */
section{
padding:120px 20px;
}

/* ABOUT */
.about{
max-width:800px;
margin:auto;
font-size:18px;
line-height:1.6;
color:#d0d0d0;
}

/* PROJECTS */
.projects{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
width:280px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #4aa3ff;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

/* BUTTON GROUP */
.project-buttons{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

/* SKILLS */
.skills{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:30px;
}

.skill{
background:#111827;
padding:15px 25px;
border-radius:8px;
transition:0.3s;
}

.skill:hover{
background:#4aa3ff;
}

/* RESUME */
.resume-btn{
display:inline-block;
padding:18px 40px;
border:2px solid #4aa3ff;
border-radius:10px;
text-decoration:none;
color:white;
font-size:18px;
background:#111827;
transition:0.3s;
}

.resume-btn:hover{
background:#4aa3ff;
color:black;
transform:scale(1.05);
}

/* CONTACT */
.contact a{
display:block;
margin:10px;
color:#4aa3ff;
text-decoration:none;
font-size:18px;
}

.contact a:hover{
text-decoration:underline;
}

/* ANIMATIONS */
@keyframes sweep{
0%{ transform:translateX(0); }
100%{ transform:translateX(50%); }
}

@keyframes float{
0%,100%{ transform:translateY(0); }
50%{ transform:translateY(-40px); }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<a href="#">Home</a>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#skills">Skills</a>
<a href="#resume">Resume</a>
<a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<div class="hero">

<div class="light light1"></div>
<div class="light light2"></div>

<div class="buttons">
<a href="https://github.com/jerry-368" class="btn" target="_blank">GitHub</a>
<a href="https://www.linkedin.com/in/jerinjohnson-gamedev" class="btn" target="_blank">LinkedIn</a>
<a href="Jerin_Johnson_Resume.pdf" class="btn" target="_blank">Resume</a>
</div>

</div>

<!-- ABOUT -->
<section id="about">
<h2>About Me</h2>
<p class="about">
Unity Gameplay Developer focused on building engaging mechanics and systems using C# and Unity.
</p>
</section>

<!-- PROJECTS -->
<section id="projects">
<h2>Featured Projects</h2>
<div class="projects">
<div class="card">Project 1</div>
<div class="card">Project 2</div>
</div>
</section>

<!-- SKILLS -->
<section id="skills">
<h2>Skills</h2>
<div class="skills">
<div class="skill">Unity</div>
<div class="skill">C#</div>
</div>
</section>

</body>
</html>
