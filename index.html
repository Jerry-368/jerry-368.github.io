<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jerin Johnson | Unity Gameplay Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#020617;color:white;overflow:hidden}

.scene{position:absolute;inset:0;display:none}
.scene.active{display:flex}

/* START SCREEN */
.start{
flex-direction:column;align-items:center;justify-content:center;text-align:center;
animation:fadeIn 1.5s ease;
}
.start h1{font-family:'Orbitron';font-size:4rem;letter-spacing:3px}
.start p{color:#94a3b8;margin:15px 0}
.start button{
padding:14px 30px;border:none;border-radius:10px;background:#22d3ee;color:#020617;font-weight:600;cursor:pointer;
box-shadow:0 0 25px rgba(34,211,238,.6);
transition:.3s
}
.start button:hover{transform:scale(1.1)}

/* HOME HERO */
.home{
justify-content:space-between;align-items:center;padding:0 80px;height:100vh;
animation:fadeIn 1s ease;
}

.left{max-width:600px}
.left h1{font-size:3.5rem}
.highlight{color:#22d3ee}
.left h2{color:#94a3b8;margin:10px 0}
.left p{color:#64748b;margin:15px 0}

.buttons{margin-top:20px}
.btn{
padding:12px 25px;border-radius:25px;text-decoration:none;margin-right:10px;font-weight:600
}
.primary{background:#22d3ee;color:#020617}
.secondary{border:2px solid #22d3ee;color:#22d3ee}

/* PROFILE */
.right{
display:flex;justify-content:center;align-items:center
}
.circle{
width:320px;height:320px;border-radius:50%;border:6px solid #22d3ee;overflow:hidden;
box-shadow:0 0 40px rgba(34,211,238,.4)
}
.circle img{width:100%;height:100%;object-fit:cover}

/* TRANSITION EFFECT */
.fade-out{animation:fadeOut .6s forwards}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{to{opacity:0}}

</style>
</head>

<body>

<!-- START SCREEN -->
<section id="start" class="scene start active">
<h1>PRESS START</h1>
<p>Unity Gameplay Developer • Systems Focus</p>
<button onclick="enterGame()">Enter</button>
</section>

<!-- HOME HERO -->
<section id="home" class="scene home">

<div class="left">
<h1>Hello, I'm <span class="highlight">Jerin Johnson</span></h1>
<h2>Unity Game Developer</h2>
<p>I build gameplay systems including AI, shooting mechanics, physics interactions and procedural systems using Unity & C#.</p>

<div class="buttons">
<a href="#" class="btn primary">View Work</a>
<a href="#" class="btn secondary">Contact Me</a>
</div>
</div>

<div class="right">
<div class="circle">
<img src="your-photo.jpg" alt="profile">
</div>
</div>

</section>

<script>
function enterGame(){
  const start = document.getElementById('start');
  start.classList.add('fade-out');

  setTimeout(()=>{
    start.classList.remove('active');
    document.getElementById('home').classList.add('active');
  },500);
}
</script>

</body>
</html>
