<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerin Johnson | Portfolio</title>
    <style>
        :root {
            --primary: #00f5ff;
            --bg: #020617;
            --accent: #ff0055;
        }

        body {
            margin: 0;
            background: var(--bg);
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            cursor: crosshair; /* Better for shooting games */
            perspective: 1000px;
        }

        canvas { position: fixed; inset: 0; z-index: -1; }

        /* VIGNETTE EFFECT */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8));
            pointer-events: none;
        }

        /* START TEXT */
        .center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
        }

        h2 { font-size: 1.2rem; letter-spacing: 5px; color: var(--primary); margin-bottom: 0; }
        .score-board { font-size: 4rem; font-weight: 800; text-shadow: 0 0 20px var(--primary); }

        /* TARGETS */
        .target {
            position: absolute;
            width: 30px; height: 30px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--primary);
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* PARTICLES */
        .p-shard {
            position: absolute;
            background: var(--primary);
            pointer-events: none;
            border-radius: 2px;
        }

        /* HOME SCREEN */
        #home {
            display: none;
            position: relative;
            height: 100vh;
            padding: 80px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .nav { display: flex; gap: 20px; margin-bottom: 40px; }
        .btn {
            padding: 12px 30px;
            border: 1px solid var(--primary);
            background: rgba(0, 245, 255, 0.05);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        .btn:hover { background: var(--primary); color: var(--bg); box-shadow: 0 0 20px var(--primary); }

        .name { font-size: 80px; font-weight: 900; line-height: 1; margin: 0; }
        .highlight { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        
        #role {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            color: var(--accent);
            height: 30px;
            margin-top: 10px;
        }

        .photo-container {
            position: absolute;
            right: 10%; top: 50%;
            transform: translateY(-50%);
            width: 320px; height: 320px;
        }

        .photo-frame {
            width: 100%; height: 100%;
            border-radius: 20px;
            border: 2px solid var(--primary);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 245, 255, 0.3);
            transform: rotate(3deg);
            background: #111;
        }

        .photo-frame img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); }

        /* RECOIL CLASS */
        .recoil { animation: kick 0.15s ease-out; }
        @keyframes kick {
            0% { transform: scale(1); }
            50% { transform: scale(0.98) translateY(10px); filter: brightness(1.5); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body id="main-body">

<canvas id="bgCanvas"></canvas>

<div class="center" id="ui-start">
    <h2>SYSTEM STATUS: LOCKED</h2>
    <div class="score-board"><span id="score">0</span> / 5</div>
    <p>ELIMINATE TARGETS TO OVERRIDE</p>
</div>

<div id="home">
    <div class="nav">
        <div class="btn">🏠 Base</div>
        <div class="btn">🎯 Missions</div>
    </div>

    <h1 class="name">JERIN<br><span class="highlight">JOHNSON</span></h1>
    <div id="role"></div>

    <div class="photo-container">
        <div class="photo-frame">
            <img src="https://via.placeholder.com/400" alt="Jerin Johnson">
        </div>
    </div>
</div>

<script>
/** 1. ANIMATED BACKGROUND (Plexus Effect) **/
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
const mouse = { x: null, y: null };

window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });

class BackgroundParticle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > canvas.width) this.x = 0;
        if (this.x < 0) this.x = canvas.width;
        if (this.y > canvas.height) this.y = 0;
        if (this.y < 0) this.y = canvas.height;
    }
    draw() {
        ctx.fillStyle = 'rgba(0, 245, 255, 0.5)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initBg() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < 100; i++) particles.push(new BackgroundParticle());
}

function animateBg() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        for (let j = i; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 150) {
                ctx.strokeStyle = `rgba(0, 245, 255, ${1 - distance/150})`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animateBg);
}
initBg(); animateBg();

/** 2. SHOOTING LOGIC **/
let score = 0;
const body = document.getElementById('main-body');

function createTarget() {
    if (score >= 5) return;
    const t = document.createElement('div');
    t.className = 'target';
    t.style.left = Math.random() * 90 + 'vw';
    t.style.top = Math.random() * 90 + 'vh';
    document.body.appendChild(t);

    t.addEventListener('mousedown', (e) => {
        // Recoil Effect
        body.classList.remove('recoil');
        void body.offsetWidth; // Trigger reflow
        body.classList.add('recoil');

        createParticles(e.clientX, e.clientY);
        t.remove();
        score++;
        document.getElementById('score').innerText = score;
        if (score >= 5) transitionToHome();
    });

    setTimeout(() => { if(t) t.remove(); }, 3000);
}

function createParticles(x, y) {
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'p-shard';
        p.style.width = Math.random() * 8 + 'px';
        p.style.height = '2px';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        document.body.appendChild(p);

        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 10 + 5;
        let px = x, py = y;

        const pInt = setInterval(() => {
            px += Math.cos(angle) * speed;
            py += Math.sin(angle) * speed;
            p.style.left = px + 'px';
            p.style.top = py + 'px';
            p.style.opacity -= 0.05;
            if (p.style.opacity <= 0) { clearInterval(pInt); p.remove(); }
        }, 16);
    }
}

setInterval(createTarget, 1000);

/** 3. TRANSITION & GLITCH TYPING **/
function transitionToHome() {
    document.getElementById('ui-start').style.display = 'none';
    const home = document.getElementById('home');
    home.style.display = 'block';
    setTimeout(() => home.style.opacity = 1, 100);
    startGlitchType();
}

const roles = ["UNITY DEVELOPER", "GAMEPLAY PROGRAMMER", "TECHNICAL ARTIST"];
let roleIdx = 0;
const glitchChars = "!<>-_\\/[]{}—=+*^?#________";

function startGlitchType() {
    const el = document.getElementById('role');
    let iteration = 0;
    let targetText = roles[roleIdx];
    
    const interval = setInterval(() => {
        el.innerText = targetText
            .split("")
            .map((letter, index) => {
                if (index < iteration) return targetText[index];
                return glitchChars[Math.floor(Math.random() * glitchChars.length)];
            })
            .join("");

        if (iteration >= targetText.length) {
            clearInterval(interval);
            setTimeout(() => {
                iteration = 0;
                roleIdx = (roleIdx + 1) % roles.length;
                startGlitchType();
            }, 2000);
        }
        iteration += 1 / 3;
    }, 30);
}
</script>
</body>
</html>
