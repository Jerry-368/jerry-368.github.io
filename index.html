<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jerin Johnson</title>

<style>
body{
margin:0;
background:#020617;
overflow:hidden;
cursor:none;
font-family:sans-serif;
}

/* canvas */
canvas{position:fixed;inset:0}

/* cursor */
.cursor{
position:fixed;
width:25px;height:25px;
border:2px solid #00f5ff;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:10;
}

/* START TEXT */
.center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:40px;
text-align:center;
}

/* COMET */
.target{
position:absolute;
width:20px;height:20px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 30px #00f5ff;
}

/* trail */
.target::after{
content:"";
position:absolute;
width:80px;height:3px;
background:linear-gradient(to right,#00f5ff,transparent);
top:50%;
left:-80px;
transform:translateY(-50%);
}

/* PARTICLES */
.particle{
position:absolute;
width:4px;height:4px;
background:#00f5ff;
border-radius:50%;
}

/* TRANSITION */
#transition{
position:fixed;
inset:0;
background:#00f5ff;
opacity:0;
z-index:100;
transition:.5s;
}

/* HOME */
#home{
display:none;
position:absolute;
inset:0;
color:white;
padding:60px;
}

/* NAV */
.nav{
position:absolute;
top:20px;left:20px;
display:flex;gap:15px;
}

.btn{
padding:10px 20px;
border:1px solid #00f5ff;
border-radius:10px;
color:#00f5ff;
cursor:pointer;
}

/* NAME */
.name{
font-size:60px;
}

.highlight{color:#00f5ff}

/* PHOTO */
.photo{
position:absolute;
right:120px;
top:50%;
transform:translateY(-50%);
width:260px;height:260px;
border-radius:50%;
overflow:hidden;
border:3px solid #00f5ff;
box-shadow:0 0 40px #00f5ff;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
transform:rotate(0deg); /* FIX ROTATION */
}

/* typing */
#role{
color:#00f5ff;
font-size:20px;
margin-top:10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>
<div id="transition"></div>

<div class="center" id="startText">
SHOOT TO START<br>
<span id="score">0</span>/5
</div>

<!-- HOME -->
<div id="home">

<div class="nav">
<div class="btn">🏠 Base</div>
<div class="btn">🎮 Missions</div>
</div>

<div class="name">
Jerin <span class="highlight">Johnson</span>
</div>

<div id="role"></div>

<div class="photo">
<img src="your-photo.png">
</div>

</div>

<script>

/* cursor */
document.addEventListener('mousemove',e=>{
cursor.style.left=e.clientX+'px';
cursor.style.top=e.clientY+'px';
});

/* background */
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight});
}

function draw(){
ctx.fillStyle="#020617";
ctx.fillRect(0,0,canvas.width,canvas.height);
stars.forEach(s=>{
ctx.fillStyle="#00f5ff";
ctx.fillRect(s.x,s.y,2,2);
});
requestAnimationFrame(draw);
}
draw();

/* GAME */
let score=0;

function spawn(){

let t=document.createElement('div');
t.className='target';

let x=Math.random()*innerWidth;
let y=Math.random()*innerHeight;

let vx=(Math.random()-0.5)*2;
let vy=(Math.random()-0.5)*2;

document.body.appendChild(t);

const move=setInterval(()=>{
x+=vx;
y+=vy;

if(x<0||x>innerWidth)vx*=-1;
if(y<0||y>innerHeight)vy*=-1;

t.style.left=x+'px';
t.style.top=y+'px';

},16);

/* HIT */
document.addEventListener('click',function hit(e){

let dx=e.clientX-x;
let dy=e.clientY-y;
let dist=Math.sqrt(dx*dx+dy*dy);

/* EASY HIT */
if(dist<70){

/* RECOIL (SCREEN SHAKE) */
document.body.style.transform="translate(5px,-5px)";
setTimeout(()=>{
document.body.style.transform="translate(0,0)";
},80);

/* PARTICLES */
for(let i=0;i<10;i++){
let p=document.createElement('div');
p.className='particle';
p.style.left=x+'px';
p.style.top=y+'px';
document.body.appendChild(p);

let vx=(Math.random()-0.5)*6;
let vy=(Math.random()-0.5)*6;

let life=0;
let pm=setInterval(()=>{
life++;
p.style.left=(parseFloat(p.style.left)+vx)+'px';
p.style.top=(parseFloat(p.style.top)+vy)+'px';
p.style.opacity=1-life/20;

if(life>20){
clearInterval(pm);
p.remove();
}
},16);
}

clearInterval(move);
t.remove();

score++;
scoreEl.innerText=score;

if(score>=5) enterHome();

document.removeEventListener('click',hit);
}
});

setTimeout(()=>{
clearInterval(move);
t.remove();
},5000);

}

setInterval(spawn,2000);

const scoreEl=document.getElementById('score');

/* TRANSITION */
function enterHome(){

transition.style.opacity=1;

setTimeout(()=>{
startText.style.display="none";
home.style.display="block";
},300);

setTimeout(()=>{
transition.style.opacity=0;
},700);

startTyping();
}

/* TYPING */
const roles=[
"Unity Game Developer",
"Gameplay Systems",
"AI & Physics",
"FPS / TPS Mechanics"
];

let roleIndex=0;
let char=0;

function startTyping(){
let el=document.getElementById('role');

setInterval(()=>{
let text=roles[roleIndex];

el.innerText=text.substring(0,char++);

if(char>text.length){
char=0;
roleIndex=(roleIndex+1)%roles.length;
}
},100);
}

</script>

</body>
</html>
