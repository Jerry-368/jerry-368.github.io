<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jerin Johnson | Unity Gameplay Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#020617;
  color:#e5e7eb;
  overflow:hidden;
}

/* GAME UI ROOT */
#game{
  position:fixed;inset:0;
}

/* SCENES */
.scene{
  position:absolute;inset:0;
  display:none;
  padding:40px;
}
.scene.active{display:block}

/* HUD */
.hud{
  position:fixed;top:20px;left:20px;right:20px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;pointer-events:none;
}
.logo{font-family:'Orbitron';color:#22d3ee;letter-spacing:2px}
.nav{pointer-events:auto}
.nav button{
  margin-left:12px;padding:8px 14px;border-radius:8px;border:1px solid #22d3ee;
  background:transparent;color:#22d3ee;cursor:pointer;transition:.2s
}
.nav button:hover{background:#22d3ee;color:#020617}

/* START SCREEN */
.start{
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:20px;
  text-align:center
}
.start h1{font-family:'Orbitron';font-size:3rem}
.start p{color:#94a3b8}
.start button{
  padding:14px 28px;border:none;border-radius:10px;
  background:#22d3ee;color:#020617;font-weight:600;cursor:pointer;
  box-shadow:0 0 20px rgba(34,211,238,.4)
}

/* LEVEL GRID */
.levels{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:80px
}
.level{
  background:#0f172a;border:1px solid rgba(34,211,238,.2);
  border-radius:16px;padding:18px;cursor:pointer;transition:.25s;position:relative;overflow:hidden
}
.level:hover{transform:translateY(-6px);box-shadow:0 0 25px rgba(34,211,238,.25)}
.level h3{font-family:'Orbitron';margin-bottom:8px}
.level p{font-size:14px;color:#94a3b8}
.level::after{
  content:"";position:absolute;inset:0;background:radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(34,211,238,.25), transparent 40%);
  opacity:0;transition:.2s
}
.level:hover::after{opacity:1}

/* PROJECT VIEW */
.project{
  display:grid;grid-template-columns:1.2fr 1fr;gap:20px;margin-top:60px
}
.video{
  background:#000;border-radius:12px;overflow:hidden;border:1px solid rgba(34,211,238,.3)
}
.video video{width:100%;height:100%;object-fit:cover}
.details{background:#0f172a;border-radius:12px;padding:20px}
.details h2{font-family:'Orbitron';margin-bottom:10px}
.details ul{margin-top:10px}
.details li{margin-bottom:6px;font-size:14px}
.back{
  margin-top:15px;padding:8px 14px;border-radius:8px;border:1px solid #22d3ee;background:transparent;color:#22d3ee;cursor:pointer
}

/* CURSOR */
.cursor{position:fixed;width:14px;height:14px;border:2px solid #22d3ee;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);z-index:999}

/* PARALLAX GRID BG */
.bg{
  position:fixed;inset:0;z-index:-1;
  background:linear-gradient(#020617,#020617),
  radial-gradient(circle at 20% 20%, rgba(34,211,238,.08), transparent 40%),
  radial-gradient(circle at 80% 80%, rgba(34,211,238,.08), transparent 40%);
}

</style>
</head>

<body>
<div class="bg" id="bg"></div>
<div class="cursor" id="cursor"></div>

<div class="hud">
  <div class="logo">JERIN // GAME PORTFOLIO</div>
  <div class="nav">
    <button onclick="go('menu')">Menu</button>
    <button onclick="go('levels')">Levels</button>
  </div>
</div>

<div id="game">

  <!-- START -->
  <section id="menu" class="scene active start">
    <h1>PRESS START</h1>
    <p>Unity Gameplay Developer • Systems Focus</p>
    <button onclick="go('levels')">Enter</button>
  </section>

  <!-- LEVEL SELECT -->
  <section id="levels" class="scene">
    <h2 style="font-family:Orbitron">Select Project</h2>
    <div class="levels">

      <div class="level" onclick="openProject('fps')">
        <h3>FPS SYSTEM</h3>
        <p>Shooting • AI • Camera</p>
      </div>

      <div class="level" onclick="openProject('runner')">
        <h3>ENDLESS RUNNER</h3>
        <p>Procedural • Pooling</p>
      </div>

      <div class="level" onclick="openProject('stack')">
        <h3>STACK TOWER</h3>
        <p>Precision • Scaling</p>
      </div>

    </div>
  </section>

  <!-- PROJECT -->
  <section id="project" class="scene">
    <div class="project">
      <div class="video">
        <video id="projVideo" autoplay muted loop></video>
      </div>
      <div class="details">
        <h2 id="projTitle"></h2>
        <p id="projDesc"></p>
        <ul id="projList"></ul>
        <button class="back" onclick="go('levels')">Back</button>
      </div>
    </div>
  </section>

</div>

<script>
const scenes = document.querySelectorAll('.scene');
function go(id){
  scenes.forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openProject(type){
  go('project');
  const video = document.getElementById('projVideo');
  const title = document.getElementById('projTitle');
  const desc = document.getElementById('projDesc');
  const list = document.getElementById('projList');
  list.innerHTML='';

  if(type==='fps'){
    video.src='videos/fps.mp4';
    title.innerText='FPS SYSTEM';
    desc.innerText='Modular shooting system with AI and camera control';
    add(['Raycast shooting','FSM enemy AI','Weapon switching','Recoil system']);
  }
  if(type==='runner'){
    video.src='videos/switchrift.mp4';
    title.innerText='ENDLESS RUNNER';
    desc.innerText='Procedural generation and optimized spawning';
    add(['Track generation','Obstacle system','Lane switching','Object pooling']);
  }
  if(type==='stack'){
    video.src='videos/stacktower.mp4';
    title.innerText='STACK TOWER';
    desc.innerText='Precision stacking with difficulty scaling';
    add(['Accuracy detection','Combo scoring','Speed scaling','Pooling']);
  }

  function add(arr){arr.forEach(i=>{const li=document.createElement('li');li.innerText=i;list.appendChild(li)})}
}

/* CURSOR */
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});

/* HOVER LIGHT */
document.querySelectorAll('.level').forEach(el=>{
  el.addEventListener('mousemove',e=>{
    const rect=el.getBoundingClientRect();
    el.style.setProperty('--x',(e.clientX-rect.left)+'px');
    el.style.setProperty('--y',(e.clientY-rect.top)+'px');
  })
});

</script>

</body>
</html>
