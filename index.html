<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jerin Johnson</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:#020617;
color:white;
overflow:hidden;
cursor:none;
}

/* BACKGROUND */
canvas{position:fixed;inset:0;z-index:-1}

/* SCENE */
.scene{
position:absolute;
inset:0;
display:none;
justify-content:center;
align-items:center;
}
.scene.active{display:flex}

/* CURSOR */
.cursor{
position:fixed;
width:25px;height:25px;
border:2px solid #00f5ff;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:999;
}

/* SHAKE */
@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(4px,-4px)}
50%{transform:translate(-4px,4px)}
75%{transform:translate(2px,2px)}
100%{transform:translate(0)}
}
.shake{animation:shake 0.2s}

/* START */
.start{
flex-direction:column;
text-align:center;
}
.title{
font-family:'Orbitron';
font-size:3rem;
}
.score{color:#00f5ff;margin-top:10px}

/* COMET */
.target{
position:absolute;
width:14px;
height:14px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 20px #00f5ff, 0 0 40px #00f5ff;
}

.target::after{
content:"";
position:absolute;
width:80px;
height:3px;
background:linear-gradient(to right,#00f5ff,transparent);
top:50%;
left:-80px;
transform:translateY(-50%);
opacity:0.7;
}

/* PARTICLES */
.particle{
position:absolute;
width:4px;height:4px;
background:#00f5ff;
border-radius:50%;
box-shadow:0 0 10px #00f5ff;
}

/* HOME */
.home{
justify-content:space-between;
padding:0 80px;
width:100%;
height:100vh;
}

.left{width:50%}
.name{
font-size:4rem;
font-weight:700;
}
.name span{color:#00f5ff}

/* PHOTO */
.right{
width:40%;
display:flex;
justify-content:center;
align-items:center;
}
.photo{
width:300px;height:300px;
border-radius:50%;
overflow:hidden;
border:3px solid #00f5ff;
box-shadow:0 0 40px #00f5ff;
}
.photo img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<!-- START -->
<section id="start" class="scene start active">
<div class="title">SHOOT TO START</div>
<div class="score">Hits: <span id="score">0</span>/5</div>
</section>

<!-- HOME -->
<section id="home" class="scene home">
<div class="left">
<div class="name">Jerin <span>Johnson</span></div>
</div>

<div class="right">
<div class="photo" id="photo">
<img src="your-photo.png">
</div>
</div>
</section>

<script>

/* CURSOR */
document.addEventListener('mousemove',e=>{
cursor.style.left=e.clientX+'px';
cursor.style.top=e.clientY+'px';
});

/* NIGHT SKY */
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<150;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,z:Math.random()*2});
}

function draw(){
ctx.fillStyle="#020617";
ctx.fillRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
s.y+=s.z;
if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
ctx.fillStyle="#00f5ff";
ctx.fillRect(s.x,s.y,2,2);
});

requestAnimationFrame(draw);
}
draw();

/* GAME */
let score=0;

function spawn(){

let t=document.createElement('div');
t.className='target';

let x=Math.random()*innerWidth;
let y=Math.random()*innerHeight;

t.style.left=x+'px';
t.style.top=y+'px';

document.body.appendChild(t);

let angle=Math.random()*Math.PI*2;
let speed=3;

let vx=Math.cos(angle)*speed;
let vy=Math.sin(angle)*speed;

t.style.transform=`rotate(${angle}rad)`;

const move=setInterval(()=>{
x+=vx;
y+=vy;

if(x<0||x>innerWidth){
vx*=-1;
angle=Math.atan2(vy,vx);
t.style.transform=`rotate(${angle}rad)`;
}
if(y<0||y>innerHeight){
vy*=-1;
angle=Math.atan2(vy,vx);
t.style.transform=`rotate(${angle}rad)`;
}

t.style.left=x+'px';
t.style.top=y+'px';

},16);

/* HIT */
t.onclick=(e)=>{
e.stopPropagation();

/* shake */
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),150);

/* particles */
for(let i=0;i<15;i++){
let p=document.createElement('div');
p.className='particle';

p.style.left=x+'px';
p.style.top=y+'px';

document.body.appendChild(p);

let a=Math.random()*Math.PI*2;
let s=2+Math.random()*3;

let vx=Math.cos(a)*s;
let vy=Math.sin(a)*s;

let life=0;

const pm=setInterval(()=>{
life++;

let px=parseFloat(p.style.left);
let py=parseFloat(p.style.top);

px+=vx;
py+=vy;

p.style.left=px+'px';
p.style.top=py+'px';

p.style.opacity=1-life/30;

if(life>30){
clearInterval(pm);
p.remove();
}
},16);
}

clearInterval(move);
t.remove();

score++;
document.getElementById('score').innerText=score;

if(score>=5){
enterHome();
}
};

setTimeout(()=>{
clearInterval(move);
t.remove();
},5000);
}

setInterval(()=>{
if(document.getElementById('start').classList.contains('active')){
spawn();
}
},1500);

/* TRANSITION */
function enterHome(){
document.getElementById('start').classList.remove('active');
document.getElementById('home').classList.add('active');
}

/* PARALLAX */
document.addEventListener('mousemove',(e)=>{
let x=(e.clientX/window.innerWidth-0.5)*30;
let y=(e.clientY/window.innerHeight-0.5)*30;
photo.style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;
});

</script>

</body>
</html>
