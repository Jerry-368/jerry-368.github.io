<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jerin Johnson | Unity Gameplay Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#020617;
color:white;
overflow-x:hidden;
cursor:none;
}

/* CUSTOM CURSOR */
.cursor{
position:fixed;
width:20px;
height:20px;
border:2px solid #facc15;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
transition:transform 0.1s ease;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 60px;
z-index:1000;
}

.navbar h2{color:#facc15;}
.navbar a{margin-left:25px;color:white;text-decoration:none;}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 80px;
position:relative;
}

.left{
max-width:600px;
}

.left h1{font-size:3.5rem;}
.highlight{color:#facc15;}

.left p{color:#94a3b8;margin:20px 0;}

.btn{
padding:12px 25px;
border-radius:30px;
text-decoration:none;
font-weight:600;
margin-right:10px;
}

.primary{background:#facc15;color:black;}
.secondary{border:2px solid #facc15;color:#facc15;}

/* GAME PANEL */
.panel{
width:320px;
height:400px;
border:2px solid rgba(250,204,21,0.3);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(250,204,21,0.2);
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}

.panel:hover{
transform:rotateY(10deg) rotateX(10deg);
}

/* PARALLAX BACKGROUND */
.parallax{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:radial-gradient(circle at center, rgba(250,204,21,0.1), transparent);
z-index:-1;
}

/* SCROLL SECTIONS */
section{
min-height:100vh;
padding:100px;
opacity:0;
transform:translateY(80px);
transition:1s;
}

section.show{
opacity:1;
transform:translateY(0);
}

/* PROJECT CARD */
.card{
background:#0f172a;
padding:20px;
border-radius:15px;
margin:20px 0;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(250,204,21,0.3);
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="parallax" id="parallax"></div>

<!-- NAV -->
<div class="navbar">
<h2>Jerin</h2>
<div>
<a href="#">Home</a>
<a href="#projects">Projects</a>
</div>
</div>

<!-- HERO -->
<section class="hero">
<div class="left">
<h1>Hello, I'm <span class="highlight">Jerin</span></h1>
<p>I build gameplay systems in Unity including AI, shooting, physics and procedural systems.</p>
<a href="#projects" class="btn primary">Start Experience</a>
</div>

<div class="panel">
<p>GAME MODE</p>
</div>
</section>

<!-- PROJECTS -->
<section id="projects">
<h2>Projects</h2>
<div class="card">FPS System - AI + Shooting + Camera</div>
<div class="card">Endless Runner - Procedural + Pooling</div>
<div class="card">Tower Stack - Precision + Scaling</div>
</section>

<script>

/* CUSTOM CURSOR */
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e=>{
cursor.style.left = e.clientX+'px';
cursor.style.top = e.clientY+'px';
});

/* PARALLAX */
const parallax = document.getElementById('parallax');
document.addEventListener('mousemove', e=>{
parallax.style.background = `radial-gradient(circle at ${e.clientX}px ${e.clientY}px, rgba(250,204,21,0.15), transparent)`;
});

/* SCROLL REVEAL */
const sections = document.querySelectorAll('section');
window.addEventListener('scroll', ()=>{
sections.forEach(sec=>{
const top = sec.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
sec.classList.add('show');
}
});
});

</script>

</body>
</html>
