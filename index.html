<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jerin Johnson</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:#020617;
color:white;
overflow:hidden;
cursor:none;
}

/* BACKGROUND */
canvas{position:fixed;inset:0;z-index:-1}

/* SCENES */
.scene{
position:absolute;
inset:0;
display:none;
justify-content:center;
align-items:center;
}
.scene.active{display:flex}

/* NAV */
.nav{
position:fixed;
top:20px;
left:20px;
display:none;
gap:10px;
z-index:10;
}
.nav button{
padding:12px 22px;
border:1px solid #00f5ff;
background:transparent;
color:#00f5ff;
border-radius:10px;
cursor:pointer;
}

/* CURSOR */
.cursor{
position:fixed;
width:25px;height:25px;
border:2px solid #00f5ff;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:999;
}
.cursor::before,.cursor::after{
content:"";position:absolute;background:#00f5ff;
}
.cursor::before{width:2px;height:100%;left:50%}
.cursor::after{height:2px;width:100%;top:50%}

/* SHAKE */
@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(3px,-3px)}
50%{transform:translate(-3px,3px)}
75%{transform:translate(2px,2px)}
100%{transform:translate(0,0)}
}
.shake{animation:shake 0.2s}

/* TRANSITION */
#transition{
position:fixed;
inset:0;
background:#00f5ff;
opacity:0;
z-index:9999;
transition:0.4s;
}

/* START */
.start{
flex-direction:column;
text-align:center;
}
.title{
font-family:'Orbitron';
font-size:3rem;
}
.score{color:#00f5ff;margin-top:10px}

/* COMET TARGET */
.target{
position:absolute;
width:10px;height:10px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 15px #00f5ff;
}
.target::after{
content:"";
position:absolute;
width:60px;
height:2px;
background:linear-gradient(to right,#00f5ff,transparent);
top:50%;
left:-60px;
transform:translateY(-50%);
}

/* HOME */
.home{
justify-content:space-between;
padding:0 80px;
width:100%;
height:100vh;
}

/* TEXT */
.left{width:50%}
.name{
font-size:4rem;
font-weight:700;
}
.name span{color:#00f5ff}

/* GLITCH */
.glitch{
font-size:1.5rem;
color:#00f5ff;
position:relative;
}
.glitch::before,.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
}
.glitch::before{left:2px;color:#ff00c8;animation:gl1 1s infinite}
.glitch::after{left:-2px;color:#00ffff;animation:gl2 1s infinite}

@keyframes gl1{
0%{clip-path:inset(0 0 80% 0)}
50%{clip-path:inset(30% 0 30% 0)}
100%{clip-path:inset(80% 0 0 0)}
}
@keyframes gl2{
0%{clip-path:inset(80% 0 0 0)}
50%{clip-path:inset(20% 0 50% 0)}
100%{clip-path:inset(0 0 80% 0)}
}

/* PHOTO */
.right{
width:40%;
display:flex;
justify-content:center;
align-items:center;
}
.photo{
width:300px;height:300px;
border-radius:50%;
overflow:hidden;
border:3px solid #00f5ff;
box-shadow:0 0 40px #00f5ff;
transition:0.2s;
}
.photo:hover{box-shadow:0 0 80px #00f5ff}
.photo img{
width:100%;
height:100%;
object-fit:cover;
}

/* LEVELS */
.levels{flex-direction:column}
.level-btn{
padding:15px 30px;
margin:10px;
border:1px solid #00f5ff;
border-radius:10px;
cursor:pointer;
}

/* PROJECT */
.project{flex-direction:column;text-align:center}
video{width:60%;border:2px solid #00f5ff;margin:20px}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>
<div id="transition"></div>

<div class="nav" id="nav">
<button onclick="home()">🏠 Base</button>
<button onclick="levels()">🎮 Missions</button>
</div>

<!-- START -->
<section id="start" class="scene start active">
<div class="title">SHOOT TO START</div>
<div class="score">Hits: <span id="score">0</span>/5</div>
</section>

<!-- HOME -->
<section id="home" class="scene home">
<div class="left">
<div class="name">Jerin <span>Johnson</span></div>
<div class="glitch" id="typing"></div>
</div>

<div class="right">
<div class="photo" id="photo">
<img src="your-photo.png">
</div>
</div>
</section>

<!-- LEVELS -->
<section id="levels" class="scene levels">
<h2>Missions</h2>
<div class="level-btn" onclick="openProject('stack')">Stack Tower</div>
<div class="level-btn" onclick="openProject('runner')">Switch Rift</div>
</section>

<!-- PROJECT -->
<section id="project" class="scene project">
<h2 id="title"></h2>
<video id="video" controls></video>
<p id="desc"></p>
<button onclick="levels()">Back</button>
</section>

<script>

/* CURSOR */
document.addEventListener('mousemove',e=>{
cursor.style.left=e.clientX+'px';
cursor.style.top=e.clientY+'px';
});

/* NIGHT SKY */
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<150;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,z:Math.random()*2});
}

function draw(){
ctx.fillStyle="#020617";
ctx.fillRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
s.y+=s.z;
if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
ctx.fillStyle="#00f5ff";
ctx.fillRect(s.x,s.y,2,2);
});

requestAnimationFrame(draw);
}
draw();

/* SHOOT GAME */
let score=0;

function spawn(){
let t=document.createElement('div');
t.className='target';

let x=Math.random()*innerWidth;
let y=Math.random()*innerHeight;

t.style.left=x+'px';
t.style.top=y+'px';

document.body.appendChild(t);

let angle=Math.random()*Math.PI*2;
let speed=2+Math.random()*2;

let vx=Math.cos(angle)*speed;
let vy=Math.sin(angle)*speed;

const move=setInterval(()=>{
x+=vx;
y+=vy;

if(x<0||x>innerWidth)vx*=-1;
if(y<0||y>innerHeight)vy*=-1;

t.style.left=x+'px';
t.style.top=y+'px';
},16);

t.onclick=()=>{
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);

clearInterval(move);
t.remove();

score++;
document.getElementById('score').innerText=score;

if(score>=5){
enterHome();
}
};

setTimeout(()=>{
clearInterval(move);
t.remove();
},4000);
}

setInterval(()=>{
if(document.getElementById('start').classList.contains('active')){
spawn();
}
},1800);

/* TRANSITION */
function enterHome(){
const start=document.getElementById('start');
const home=document.getElementById('home');
const t=document.getElementById('transition');

t.style.opacity=1;

setTimeout(()=>{
start.classList.remove('active');
home.classList.add('active');
nav.style.display='flex';
},400);

setTimeout(()=>{t.style.opacity=0},700);
}

/* NAV */
function home(){hideAll();homeSection.classList.add('active')}
function levels(){hideAll();levelsSection.classList.add('active')}

function hideAll(){
document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
}

/* PROJECT */
function openProject(type){
hideAll();
project.classList.add('active');

if(type==='stack'){
title.innerText="Stack Tower";
desc.innerText="Stacking game.";
video.src="videos/stacktower.mp4";
}
if(type==='runner'){
title.innerText="Switch Rift";
desc.innerText="Endless runner.";
video.src="videos/switchrift.mp4";
}
}

/* TYPING */
const roles=["Unity Game Developer","Gameplay Systems","AI & Physics"];
let i=0,j=0,del=false;

function type(){
let txt=roles[j];
typing.textContent=txt.substring(0,i);
typing.setAttribute("data-text",txt.substring(0,i));

if(!del){
i++;
if(i>txt.length){del=true;setTimeout(type,800);return;}
}else{
i--;
if(i==0){del=false;j=(j+1)%roles.length;}
}
setTimeout(type,del?40:80);
}
type();

/* PARALLAX */
document.addEventListener('mousemove',(e)=>{
let x=(e.clientX/window.innerWidth-0.5)*30;
let y=(e.clientY/window.innerHeight-0.5)*30;
photo.style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;
});

</script>

</body>
</html>
