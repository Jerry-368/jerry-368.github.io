<!DOCTYPE html>
<html>

<head>
<title>Jerin Johnson | Unity Gameplay Developer</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0f1a;
color:white;
text-align:center;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
background:#0b0f1a;
padding:15px;
display:flex;
justify-content:center;
gap:40px;
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.navbar a:hover{
color:#4aa3ff;
}

/* HERO (KEEP BANNER) */
.hero{
position:relative;
height:100vh;
background:url("banner.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:flex-end;
padding-bottom:120px;
overflow:hidden;
}

/* DARK OVERLAY */
.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;
left:0;
z-index:1;
}

/* ANIMATED GRADIENT LAYER */
.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:200%;
height:200%;
background:linear-gradient(
120deg,
rgba(74,163,255,0.15),
transparent,
rgba(74,163,255,0.1)
);
animation:moveGradient 12s linear infinite;
z-index:1;
}

/* FLOATING LIGHT BLOBS */
.blob{
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle, rgba(74,163,255,0.25), transparent);
filter:blur(80px);
animation:float 10s infinite ease-in-out;
}

.blob1{ top:10%; left:20%; }
.blob2{ bottom:10%; right:20%; animation-delay:3s; }

/* KEEP CONTENT ABOVE */
.hero *{
position:relative;
z-index:2;
}

/* BUTTONS */
.buttons{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:12px 25px;
border:2px solid #4aa3ff;
border-radius:8px;
text-decoration:none;
color:white;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(6px);
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#4aa3ff;
color:black;
transform:scale(1.05);
box-shadow:0 0 15px #4aa3ff;
}

/* SECTIONS */
section{
padding:120px 20px;
}

/* PROJECTS */
.projects{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
width:280px;
}

/* SKILLS */
.skills{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.skill{
background:#111827;
padding:15px 25px;
border-radius:8px;
}

/* ANIMATIONS */
@keyframes moveGradient{
0%{ transform:translate(0,0); }
100%{ transform:translate(-25%, -25%); }
}

@keyframes float{
0%,100%{ transform:translateY(0); }
50%{ transform:translateY(-40px); }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<a href="#">Home</a>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#skills">Skills</a>
</nav>

<!-- HERO -->
<div class="hero">

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="buttons">
<a href="https://github.com/jerry-368" class="btn" target="_blank">GitHub</a>
<a href="https://www.linkedin.com/in/jerinjohnson-gamedev" class="btn" target="_blank">LinkedIn</a>
<a href="Jerin_Johnson_Resume.pdf" class="btn" target="_blank">Resume</a>
</div>

</div>

<!-- ABOUT -->
<section id="about">
<h2>About Me</h2>
<p style="max-width:800px;margin:auto;color:#d0d0d0;">
Unity Gameplay Developer focused on building engaging mechanics and systems.
</p>
</section>

<!-- PROJECTS -->
<section id="projects">
<h2>Projects</h2>
<div class="projects">
<div class="card">Stack Tower</div>
<div class="card">Switch Rift</div>
</div>
</section>

<!-- SKILLS -->
<section id="skills">
<h2>Skills</h2>
<div class="skills">
<div class="skill">Unity</div>
<div class="skill">C#</div>
</div>
</section>

</body>
</html>
