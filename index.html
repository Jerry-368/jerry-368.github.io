<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0f1a;
color:white;
text-align:center;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
background:#0b0f1a;
padding:15px;
display:flex;
justify-content:center;
gap:40px;
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.navbar a:hover{
color:#4aa3ff;
}

/* HERO */
.hero{
height:100vh;
background:url("banner.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:flex-end;
padding-bottom:120px;
position:relative;
overflow:hidden;
}

/* === BACKGROUND ANIMATION (ADDED ONLY THIS) === */
.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, rgba(0,150,255,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,200,255,0.12), transparent 40%),
radial-gradient(circle at 50% 50%, rgba(0,100,255,0.08), transparent 50%);
animation:moveBg 25s linear infinite;
z-index:0;
}

.hero *{
position:relative;
z-index:1;
}

@keyframes moveBg{
0%{transform:translate(0,0);}
50%{transform:translate(-5%,-5%);}
100%{transform:translate(0,0);}
}

/* BUTTONS */
.buttons{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:12px 25px;
border:2px solid #4aa3ff;
border-radius:8px;
text-decoration:none;
color:white;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(6px);
font-weight:bold;
transition:0.3s;
display:inline-block;
margin-top:10px;
}

.btn:hover{
background:#4aa3ff;
color:black;
transform:scale(1.05);
box-shadow:0 0 15px #4aa3ff;
}

/* SECTIONS */
section{
padding:120px 20px;
}

/* ABOUT */
.about{
max-width:800px;
margin:auto;
font-size:18px;
line-height:1.6;
color:#d0d0d0;
}

/* PROJECTS */
.projects{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
width:280px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #4aa3ff;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

/* BUTTON GROUP */
.project-buttons{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

/* SKILLS */
.skills{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:30px;
}

.skill{
background:#111827;
padding:15px 25px;
border-radius:8px;
transition:0.3s;
}

.skill:hover{
background:#4aa3ff;
}

/* RESUME */
.resume-btn{
display:inline-block;
padding:18px 40px;
border:2px solid #4aa3ff;
border-radius:10px;
text-decoration:none;
color:white;
font-size:18px;
background:#111827;
transition:0.3s;
}

.resume-btn:hover{
background:#4aa3ff;
color:black;
transform:scale(1.05);
}

/* CONTACT */
.contact a{
display:block;
margin:10px;
color:#4aa3ff;
text-decoration:none;
font-size:18px;
}

.contact a:hover{
text-decoration:underline;
}

</style>
