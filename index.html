<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jerin Johnson</title>

<style>
body{
margin:0;
background:#020617;
overflow:hidden;
cursor:none;
font-family:sans-serif;
}

/* canvas */
canvas{position:fixed;inset:0}

/* cursor */
.cursor{
position:fixed;
width:25px;height:25px;
border:2px solid #00f5ff;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:10;
}

/* center text */
.center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:40px;
text-align:center;
z-index:5;
}

/* comet */
.target{
position:absolute;
width:24px;height:24px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 30px #00f5ff;
padding:20px;
}

.target::after{
content:"";
position:absolute;
width:100px;height:3px;
background:linear-gradient(to right,#00f5ff,transparent);
top:50%;
left:-100px;
transform:translateY(-50%);
}

/* particles */
.particle{
position:absolute;
width:5px;height:5px;
background:#00f5ff;
border-radius:50%;
box-shadow:0 0 10px #00f5ff;
}

/* TRANSITION */
#transition{
position:fixed;
inset:0;
background:#00f5ff;
opacity:0;
z-index:100;
transition:0.5s;
}

/* HOME */
#home{
display:none;
position:absolute;
inset:0;
color:white;
padding:80px;
}

.name{
font-size:60px;
}
.highlight{color:#00f5ff}

.photo{
position:absolute;
right:100px;
top:50%;
transform:translateY(-50%);
width:250px;height:250px;
border-radius:50%;
overflow:hidden;
border:3px solid #00f5ff;
box-shadow:0 0 40px #00f5ff;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<div id="transition"></div>

<div class="center" id="startText">
SHOOT TO START<br>
<span id="score">0</span>/5
</div>

<!-- HOME PAGE -->
<div id="home">
<div class="name">Jerin <span class="highlight">Johnson</span></div>
<p>Unity Game Developer</p>

<div class="photo">
<img src="your-photo.png">
</div>
</div>

<script>

/* cursor */
document.addEventListener('mousemove',e=>{
cursor.style.left=e.clientX+'px';
cursor.style.top=e.clientY+'px';
});

/* background */
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight});
}

function draw(){
ctx.fillStyle="#020617";
ctx.fillRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
ctx.fillStyle="#00f5ff";
ctx.fillRect(s.x,s.y,2,2);
});

requestAnimationFrame(draw);
}
draw();

/* GAME */
let score=0;

function spawn(){

let t=document.createElement('div');
t.className='target';

let x=Math.random()*innerWidth;
let y=Math.random()*innerHeight;

t.style.left=x+'px';
t.style.top=y+'px';

document.body.appendChild(t);

/* slow movement */
let vx=(Math.random()-0.5)*1.5;
let vy=(Math.random()-0.5)*1.5;

const move=setInterval(()=>{
x+=vx;
y+=vy;

if(x<0||x>innerWidth)vx*=-1;
if(y<0||y>innerHeight)vy*=-1;

t.style.left=x+'px';
t.style.top=y+'px';

},20);

/* AIM ASSIST HIT */
document.addEventListener('click',function hit(e){

let dx=e.clientX - x;
let dy=e.clientY - y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist < 80){

/* particles */
for(let i=0;i<12;i++){
let p=document.createElement('div');
p.className='particle';
p.style.left=x+'px';
p.style.top=y+'px';
document.body.appendChild(p);

let vx=(Math.random()-0.5)*6;
let vy=(Math.random()-0.5)*6;

let life=0;

let pm=setInterval(()=>{
life++;
p.style.left=(parseFloat(p.style.left)+vx)+'px';
p.style.top=(parseFloat(p.style.top)+vy)+'px';
p.style.opacity=1-life/30;

if(life>30){
clearInterval(pm);
p.remove();
}
},16);
}

clearInterval(move);
t.remove();

score++;
document.getElementById('score').innerText=score;

if(score>=5){
enterHome();
}

document.removeEventListener('click',hit);
}
});

setTimeout(()=>{
clearInterval(move);
t.remove();
},5000);

}

setInterval(spawn,2000);

/* CINEMATIC TRANSITION */
function enterHome(){

const t=document.getElementById('transition');
const start=document.getElementById('startText');
const home=document.getElementById('home');

/* flash */
t.style.opacity=1;

/* zoom effect */
document.body.style.transform="scale(1.2)";
document.body.style.transition="0.5s";

/* switch */
setTimeout(()=>{
start.style.display="none";
home.style.display="block";
},400);

/* fade out */
setTimeout(()=>{
t.style.opacity=0;
document.body.style.transform="scale(1)";
},700);

}

</script>

</body>
</html>
