<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerin Johnson | Portfolio</title>
    <style>
        :root {
            --primary: #00f5ff;
            --bg: #010409;
            --accent: #ff0055;
            --glow: 0 0 15px rgba(0, 245, 255, 0.6);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            cursor: crosshair;
        }

        canvas { position: fixed; inset: 0; z-index: 1; }

        /* SCAN TRANSITION LAYER */
        #scan-transition {
            position: fixed;
            inset: 0;
            background: var(--primary);
            z-index: 100;
            clip-path: circle(0% at 50% 50%);
            transition: clip-path 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            pointer-events: none;
        }

        /* START PAGE UI */
        #ui-start {
            position: absolute;
            top: 40%; left: 50%; /* Moved down slightly from top */
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        .score-board {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: var(--primary);
            text-shadow: var(--glow);
            margin: 0;
            line-height: 1;
        }

        .hint {
            letter-spacing: 4px;
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* HOME PAGE UI */
        #home {
            display: none;
            position: relative;
            z-index: 5;
            height: 100vh;
            padding: 6vw;
            box-sizing: border-box;
            opacity: 0;
        }

        .nav { display: flex; gap: 20px; margin-bottom: 50px; }
        .btn {
            padding: 10px 25px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        .btn:hover { background: var(--primary); color: var(--bg); box-shadow: var(--glow); }

        .name-container { margin-top: 5vh; }
        .name { font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 900; line-height: 0.9; margin: 0; }
        .highlight { color: var(--primary); text-shadow: var(--glow); }
        
        #role {
            font-family: monospace;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--accent);
            margin-top: 20px;
            min-height: 1.5em;
        }

        .photo-container {
            position: absolute;
            right: 8%; bottom: 10%;
            width: clamp(200px, 30vw, 350px);
            height: clamp(200px, 30vw, 350px);
        }

        .photo-frame {
            width: 100%; height: 100%;
            border: 2px solid var(--primary);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
            transform: rotate(2deg);
        }

        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* TARGETS */
        .target {
            position: absolute;
            width: 35px; height: 35px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: var(--glow);
            z-index: 2;
            animation: targetSpawn 0.3s ease-out;
        }

        @keyframes targetSpawn { from { transform: scale(0); } to { transform: scale(1); } }
        
        .recoil { animation: kick 0.1s ease-out; }
        @keyframes kick { 
            0% { transform: translateY(0); } 
            50% { transform: translateY(8px); filter: contrast(1.2); } 
            100% { transform: translateY(0); } 
        }

    </style>
</head>
<body id="main-body">

<div id="scan-transition"></div>
<canvas id="bgCanvas"></canvas>

<div class="center" id="ui-start">
    <div class="score-board"><span id="score">0</span> / 5</div>
    <div class="hint">ELIMINATE TARGETS TO ACCESS</div>
</div>

<div id="home">
    <div class="nav">
        <div class="btn">🏠 Base</div>
        <div class="btn">🎯 Missions</div>
    </div>

    <div class="name-container">
        <h1 class="name">JERIN<br><span class="highlight">JOHNSON</span></h1>
        <div id="role"></div>
    </div>

    <div class="photo-container">
        <div class="photo-frame">
            <img src="your-photo.png" alt="Jerin Johnson">
        </div>
    </div>
</div>

<script>
/** 1. OPTIMIZED BACKGROUND (Lower particle count for speed) **/
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function initBg() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    // Decreased count to 60 for better performance/load time
    for (let i = 0; i < 60; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            sx: Math.random() * 0.6 - 0.3,
            sy: Math.random() * 0.6 - 0.3
        });
    }
}

function animateBg() {
    ctx.fillStyle = "#010409";
    ctx.fillRect(0,0,canvas.width, canvas.height);
    
    for (let i = 0; i < particles.length; i++) {
        let p = particles[i];
        p.x += p.sx; p.y += p.sy;
        if (p.x < 0 || p.x > canvas.width) p.sx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.sy *= -1;

        ctx.fillStyle = "rgba(0, 245, 255, 0.5)";
        ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();

        for (let j = i + 1; j < particles.length; j++) {
            let p2 = particles[j];
            let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
            if (dist < 140) {
                ctx.strokeStyle = `rgba(0, 245, 255, ${1 - dist/140})`;
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animateBg);
}
initBg(); animateBg();
window.onresize = initBg;

/** 2. SHOOTING & RECOIL **/
let score = 0;
const body = document.getElementById('main-body');

function createTarget() {
    if (score >= 5) return;
    const t = document.createElement('div');
    t.className = 'target';
    t.style.left = (Math.random() * 80 + 10) + 'vw';
    t.style.top = (Math.random() * 60 + 20) + 'vh';
    document.body.appendChild(t);

    t.onmousedown = (e) => {
        score++;
        document.getElementById('score').innerText = score;
        
        // Recoil
        body.classList.remove('recoil');
        void body.offsetWidth; 
        body.classList.add('recoil');

        t.remove();
        if (score >= 5) transitionToHome();
    };
    setTimeout(() => { if(t) t.remove(); }, 2500);
}
setInterval(createTarget, 1000);

/** 3. SMOOTH TRANSITION **/
function transitionToHome() {
    const scan = document.getElementById('scan-transition');
    const startUI = document.getElementById('ui-start');
    const home = document.getElementById('home');

    // Start circle expansion
    scan.style.clipPath = "circle(150% at 50% 50%)";

    setTimeout(() => {
        startUI.style.display = 'none';
        home.style.display = 'block';
        // Remove targets if any left
        document.querySelectorAll('.target').forEach(el => el.remove());
    }, 400);

    setTimeout(() => {
        scan.style.clipPath = "circle(0% at 50% 50%)";
        home.style.opacity = 1;
        startGlitchType();
    }, 800);
}

/** 4. GLITCH TEXT **/
const roles = ["UNITY DEVELOPER", "GAMEPLAY PROGRAMMER", "TECHNICAL ARTIST"];
let roleIdx = 0;
const glitchChars = "X01_#$@&%*<>{}";

function startGlitchType() {
    const el = document.getElementById('role');
    let iteration = 0;
    let targetText = roles[roleIdx];
    
    const interval = setInterval(() => {
        el.innerText = targetText.split("").map((letter, index) => {
            if (index < iteration) return targetText[index];
            return glitchChars[Math.floor(Math.random() * glitchChars.length)];
        }).join("");

        if (iteration >= targetText.length) {
            clearInterval(interval);
            setTimeout(() => {
                iteration = 0;
                roleIdx = (roleIdx + 1) % roles.length;
                startGlitchType();
            }, 2500);
        }
        iteration += 1 / 2;
    }, 40);
}
</script>
</body>
</html>
