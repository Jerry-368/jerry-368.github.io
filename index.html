<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 50 },
    color: { value: "#4aa3ff" },
    size: { value: 3 },
    move: { speed: 1 }
  }
});

// GAME SYSTEM
const shoot = document.querySelector(".shoot-effect");
const scoreEl = document.querySelector(".score");

let score = 0;
let enemies = [];
const MAX_ENEMIES = 6;

// SPAWN ENEMY
function spawnEnemy(){
  if(enemies.length >= MAX_ENEMIES) return;

  const enemy = document.createElement("div");
  enemy.className = "enemy";

  const x = Math.random() * (window.innerWidth - 40);
  const y = Math.random() * (window.innerHeight - 40);

  enemy.style.transform = `translate(${x}px, ${y}px)`;

  document.body.appendChild(enemy);
  enemies.push(enemy);

  setTimeout(() => removeEnemy(enemy), 2500);
}

// REMOVE
function removeEnemy(enemy){
  const i = enemies.indexOf(enemy);
  if(i > -1){
    enemies.splice(i,1);
    enemy.remove();
  }
}

// SHOOT
document.addEventListener("click", (e) => {

  // flash
  shoot.style.left = e.clientX + "px";
  shoot.style.top = e.clientY + "px";
  shoot.style.opacity = 1;
  shoot.style.transform = "translate(-50%, -50%) scale(1)";

  setTimeout(() => {
    shoot.style.opacity = 0;
    shoot.style.transform = "translate(-50%, -50%) scale(0)";
  }, 100);

  // hit detection
  for(let i = enemies.length - 1; i >= 0; i--){
    const rect = enemies[i].getBoundingClientRect();

    if(
      e.clientX >= rect.left &&
      e.clientX <= rect.right &&
      e.clientY >= rect.top &&
      e.clientY <= rect.bottom
    ){
      removeEnemy(enemies[i]);
      score += 10;
      scoreEl.innerText = "Score: " + score;
      break;
    }
  }

});

// LOOP
setInterval(spawnEnemy, 800);

</script>
