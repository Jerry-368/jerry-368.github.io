<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jerin Johnson | Unity Gameplay Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#030712;color:white;overflow:hidden}

canvas{position:fixed;inset:0;z-index:-1}

.home{position:absolute;inset:0;display:flex;justify-content:space-between;align-items:center;padding:0 80px}
.left{max-width:620px}

.name{font-size:3rem;font-weight:600}
.highlight{color:#00f5ff}

/* TYPING */
.typing{font-size:1.6rem;color:#00f5ff;margin:14px 0;min-height:34px;white-space:nowrap;overflow:hidden;border-right:2px solid #00f5ff;animation:blink .8s infinite}
@keyframes blink{0%,100%{border-color:#00f5ff}50%{border-color:transparent}}

/* GLITCH */
.glitch{position:relative;display:inline-block}
.glitch::before,.glitch::after{
  content:attr(data-text);
  position:absolute;left:0;top:0;overflow:hidden;clip-path:inset(0 0 0 0);
}
.glitch::before{left:2px;text-shadow:-2px 0 #00f5ff;animation:glitch1 2s infinite linear alternate-reverse}
.glitch::after{left:-2px;text-shadow:2px 0 #ff00c8;animation:glitch2 1.5s infinite linear alternate-reverse}
@keyframes glitch1{0%{clip-path:inset(10% 0 80% 0)}20%{clip-path:inset(40% 0 30% 0)}40%{clip-path:inset(80% 0 5% 0)}60%{clip-path:inset(20% 0 60% 0)}80%{clip-path:inset(60% 0 20% 0)}100%{clip-path:inset(30% 0 40% 0)}}
@keyframes glitch2{0%{clip-path:inset(60% 0 20% 0)}25%{clip-path:inset(20% 0 60% 0)}50%{clip-path:inset(80% 0 5% 0)}75%{clip-path:inset(40% 0 30% 0)}100%{clip-path:inset(10% 0 80% 0)}}

.desc{color:#94a3b8;max-width:520px}

.circle{width:280px;height:280px;border-radius:50%;border:5px solid #00f5ff;overflow:hidden;box-shadow:0 0 30px rgba(0,245,255,.4);transform:translateZ(0)}
.circle img{width:100%;height:100%;object-fit:cover}

/* MOUSE REACT */
.react{transition:transform .15s ease}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<section class="home">
  <div class="left">
    <div class="name react">Jerin <span class="highlight">Johnson</span></div>
    <div class="typing glitch react" id="typing" data-text=""></div>
    <div class="desc react">I build gameplay systems: AI (FSM), shooting, physics, and procedural generation in Unity (C#).</div>
  </div>
  <div class="circle react"><img src="your-photo.jpg" alt="profile"></div>
</section>

<script>
// PARTICLES
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();addEventListener('resize',resize);
let ps=Array.from({length:110},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:1.4,dx:(Math.random()-0.5)*.6,dy:(Math.random()-0.5)*.6}));
(function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#00f5ff';ps.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()});requestAnimationFrame(loop)})();

// MULTI-ROLE TYPING
const roles=[
  'Unity Game Developer',
  'Gameplay Systems Engineer',
  'AI & Physics Programmer'
];
const el=document.getElementById('typing');
let r=0,i=0,del=false;
function type(){
  const text=roles[r];
  el.dataset.text=text; // for glitch layers
  if(!del){
    el.textContent=text.slice(0,i+1); i++;
    if(i===text.length){del=true; return setTimeout(type,900)}
  }else{
    el.textContent=text.slice(0,i-1); i--;
    if(i===0){del=false; r=(r+1)%roles.length}
  }
  setTimeout(type, del?40:80);
}
setTimeout(type,400);

// MOUSE REACTION (parallax tilt)
const reactEls=document.querySelectorAll('.react');
document.addEventListener('mousemove',e=>{
  const x=(e.clientX/window.innerWidth-0.5)*10;
  const y=(e.clientY/window.innerHeight-0.5)*10;
  reactEls.forEach(el=>{
    el.style.transform=`translate(${x}px, ${y}px)`;
  });
});
</script>

</body>
</html>
