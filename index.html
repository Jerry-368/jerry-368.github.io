<!DOCTYPE html>
<html>

<head>
<title>Jerin Johnson | Unity Gameplay Developer</title>

<style>

html{
scroll-behavior:smooth;
cursor:crosshair;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0f1a;
color:white;
text-align:center;
cursor:crosshair;
overflow-x:hidden;
}

/* PARTICLES */
#particles-js{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

/* SCORE */
.score{
position:fixed;
top:20px;
right:20px;
font-size:20px;
z-index:1001;
color:#4aa3ff;
}

/* ENEMY */
.enemy{
position:fixed;
width:35px;
height:35px;
background:red;
border-radius:50%;
z-index:900;
will-change:transform;
}

/* SHOOT EFFECT */
.shoot-effect{
position:fixed;
width:25px;
height:25px;
border-radius:50%;
background:rgba(74,163,255,0.6);
pointer-events:none;
transform:translate(-50%, -50%) scale(0);
opacity:0;
z-index:1000;
transition:transform 0.1s, opacity 0.1s;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
background:#0b0f1a;
padding:15px;
display:flex;
justify-content:center;
gap:40px;
z-index:1000;
}

/* HERO */
.hero{
position:relative;
height:100vh;
background:url("banner.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:flex-end;
padding-bottom:120px;
z-index:1;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

/* BUTTONS */
.buttons{
position:relative;
z-index:2;
display:flex;
gap:20px;
}

.btn{
padding:12px 25px;
border:2px solid #4aa3ff;
border-radius:8px;
color:white;
background:rgba(0,0,0,0.6);
text-decoration:none;
}

</style>
</head>

<body>

<div id="particles-js"></div>
<div class="score">Score: 0</div>

<nav class="navbar">
<a href="#">Home</a>
<a href="#about">About</a>
<a href="#projects">Projects</a>
</nav>

<div class="hero">
<div class="shoot-effect"></div>

<div class="buttons">
<a href="#" class="btn">GitHub</a>
<a href="#" class="btn">LinkedIn</a>
</div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
// PARTICLES (reduced load)
particlesJS("particles-js", {
  particles: {
    number: { value: 50 }, // reduced for performance
    color: { value: "#4aa3ff" },
    size: { value: 3 },
    move: { speed: 1 }
  }
});

// GAME SYSTEM
const shoot = document.querySelector(".shoot-effect");
const scoreEl = document.querySelector(".score");

let score = 0;
let enemies = [];
const MAX_ENEMIES = 6;

// SPAWN ENEMY (optimized)
function spawnEnemy(){
  if(enemies.length >= MAX_ENEMIES) return;

  const enemy = document.createElement("div");
  enemy.className = "enemy";

  const x = Math.random() * (window.innerWidth - 40);
  const y = Math.random() * (window.innerHeight - 40);

  enemy.style.transform = `translate(${x}px, ${y}px)`;

  document.body.appendChild(enemy);
  enemies.push(enemy);

  // remove safely
  setTimeout(() => removeEnemy(enemy), 2500);
}

function removeEnemy(enemy){
  const index = enemies.indexOf(enemy);
  if(index > -1){
    enemies.splice(index,1);
    enemy.remove();
  }
}

// CLICK SHOOT (optimized hit detection)
document.addEventListener("click", (e) => {

  // shoot flash
  shoot.style.left = e.clientX + "px";
  shoot.style.top = e.clientY + "px";
  shoot.style.opacity = 1;
  shoot.style.transform = "translate(-50%, -50%) scale(1)";

  setTimeout(() => {
    shoot.style.opacity = 0;
    shoot.style.transform = "translate(-50%, -50%) scale(0)";
  }, 100);

  // check hit (small array, fast)
  for(let i = enemies.length - 1; i >= 0; i--){
    const rect = enemies[i].getBoundingClientRect();

    if(
      e.clientX >= rect.left &&
      e.clientX <= rect.right &&
      e.clientY >= rect.top &&
      e.clientY <= rect.bottom
    ){
      removeEnemy(enemies[i]);
      score += 10;
      scoreEl.innerText = "Score: " + score;
      break; // stop after first hit
    }
  }

});

// SPAWN LOOP (controlled)
setInterval(spawnEnemy, 800);

</script>

</body>
</html>
